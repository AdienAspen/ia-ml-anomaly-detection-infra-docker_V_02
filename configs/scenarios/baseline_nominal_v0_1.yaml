schema_version: scenario_config_v0_1
scenario_id: baseline_nominal_v0_1
description: Nominal multi-service behavior without injected degradation.
mode_support:
  pre_hoc: true
  ad_hoc: true
services:
  - payments-api
  - checkout-api
  - orders-api
  - redis-broker
noise:
  jitter_seconds:
    min: 0
    max: 2
  propagation_lag_seconds:
    min: 10
    max: 90
  intensity:
    distribution: constant
    value: 1.0
  recovery_phases: []
  intermittent_failure: false
propagation:
  sequence: []
  hidden_dependencies: []
labels:
  anomaly: false
  class_name: nominal
telemetry:
  root_operation: baseline_cycle
  steps: 6
  interval_seconds: 30
metric_baselines:
  payments-api:
    latency_ms: 180.0
    error_rate: 0.012
    throughput: 220.0
  orders-api:
    latency_ms: 165.0
    error_rate: 0.010
    throughput: 190.0
  checkout-api:
    latency_ms: 175.0
    error_rate: 0.011
    throughput: 170.0
  redis-broker:
    latency_ms: 7.5
    queue_depth: 24.0
