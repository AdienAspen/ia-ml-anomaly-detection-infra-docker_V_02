schema_version: scenario_config_v0_1
scenario_id: latency_propagation_jitter_v0_1
description: V_01-inspired latency propagation with causal jitter and staged recovery.
mode_support:
  pre_hoc: true
  ad_hoc: true
services:
  - payments-api
  - redis-broker
  - checkout-api
  - orders-api
noise:
  jitter_seconds:
    min: -20
    max: 20
  propagation_lag_seconds:
    min: 10
    max: 90
  intensity:
    distribution: lognormal
    mean: 1.0
    sigma: 0.35
  recovery_phases:
    - 2
    - 5
    - 10
  intermittent_failure: true
propagation:
  sequence:
    - payments-api
    - redis-broker
    - checkout-api
    - orders-api
  hidden_dependencies:
    - source: checkout-api
      target: redis-broker
labels:
  anomaly: true
  class_name: latency_propagation
telemetry:
  root_operation: process_payment
  steps: 8
  interval_seconds: 30
metric_baselines:
  payments-api:
    latency_ms: 180.0
    error_rate: 0.012
    throughput: 220.0
  redis-broker:
    latency_ms: 7.5
    queue_depth: 24.0
  checkout-api:
    latency_ms: 175.0
    error_rate: 0.011
    throughput: 170.0
  orders-api:
    latency_ms: 165.0
    error_rate: 0.010
    throughput: 190.0
