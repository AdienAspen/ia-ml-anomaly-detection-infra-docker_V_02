schema_version: scenario_schema_v0_1
required_fields:
  - scenario_id
  - mode_support
  - services
  - noise
  - propagation
  - labels
  - metric_baselines
  - telemetry
noise_dimensions:
  jitter_seconds:
    type: range
  propagation_lag_seconds:
    type: range
  intensity:
    type: distribution
  recovery_phases:
    type: list
  intermittent_failure:
    type: boolean
telemetry:
  output_format: otel_jsonl
  raw_artifact_kind: otel_pre_hoc_raw_traces
artifact_policy:
  raw_otel_first: true
  derived_tabular_dataset: true
